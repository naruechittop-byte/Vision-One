<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vision One CRM</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{margin:0;font-family:Inter,Segoe UI,Tahoma,sans-serif;background:#f6f3ee;color:#2e2e2e}main{padding:28px}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}.top h1{font-family:Georgia,serif;color:#071A2F;margin:0;font-weight:500}.sub{color:#77726c;font-size:13px}.card{background:white;border:1px solid #D8D3CB;border-radius:20px;padding:18px;box-shadow:0 18px 45px rgba(7,26,47,.08);margin-top:18px}button{border:0;border-radius:14px;padding:11px 14px;background:#071A2F;color:white;font-weight:800;cursor:pointer}button.secondary{background:white;color:#071A2F;border:1px solid #D8D3CB}table{width:100%;border-collapse:separate;border-spacing:0 9px}th{text-align:left;color:#8a837a;font-size:12px;text-transform:uppercase;padding:0 10px}td{background:#fbfaf7;border-top:1px solid #D8D3CB;border-bottom:1px solid #D8D3CB;padding:12px 10px;font-size:14px}td:first-child{border-left:1px solid #D8D3CB;border-radius:13px 0 0 13px}td:last-child{border-right:1px solid #D8D3CB;border-radius:0 13px 13px 0}.modal{position:fixed;inset:0;background:rgba(7,26,47,.35);display:none;align-items:center;justify-content:center;padding:18px}.modal.active{display:flex}.box{width:min(720px,100%);background:#fbfaf7;border-radius:24px;padding:22px}.form{display:grid;grid-template-columns:1fr 1fr;gap:13px}label{display:block;font-size:12px;font-weight:800;color:#756f68;margin-bottom:6px}input,select,textarea{width:100%;border:1px solid #D8D3CB;border-radius:13px;padding:11px;background:white}.span{grid-column:1/-1}.badge{border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;background:#F7EEDB;color:#8c641b}.ok{background:#E6F2EA;color:#2f6948}</style></head><body><main><div class="top"><div><h1>Vision One CRM Follow-up</h1><div class="sub" id="status">Loading...</div></div><div><a href="/app-vercel.html"><button class="secondary">Clinic OS</button></a> <button onclick="openModal()">+ Follow-up</button></div></div><div class="card"><h3>Follow-up Tasks</h3><div id="list"></div></div></main><div id="modal" class="modal"><div class="box"><div class="top"><div><h1>New Follow-up</h1><div class="sub">บันทึกลง crm_followups</div></div><button class="secondary" onclick="closeModal()">Close</button></div><form class="form" onsubmit="saveFollowup(event)"><div><label>Patient</label><select name="patient_id" id="patients"></select></div><div><label>Type</label><select name="followup_type"><option>recall</option><option>post_op</option><option>medication</option><option>review</option><option>birthday</option><option>campaign</option><option>other</option></select></div><div><label>Channel</label><select name="channel"><option>line</option><option>phone</option><option>sms</option><option>email</option><option>walk_in</option><option>other</option></select></div><div><label>Due</label><input type="datetime-local" name="due_at" required></div><div><label>Priority</label><select name="priority"><option>normal</option><option>high</option><option>urgent</option><option>low</option></select></div><div><label>Status</label><select name="status"><option>pending</option><option>contacted</option><option>scheduled</option><option>completed</option></select></div><div class="span"><label>Message</label><textarea name="message"></textarea></div><div class="span"><button>Save</button></div></form></div></div><script>let sb,patients=[],tasks=[];const fmt=d=>d?new Date(d).toLocaleString('th-TH',{dateStyle:'medium',timeStyle:'short'}):'-';const name=p=>p?`${p.first_name||''} ${p.last_name||''}`.trim():'-';function badge(s){return `<span class="badge ${['completed','contacted'].includes(s)?'ok':''}">${s||'-'}</span>`}async function init(){try{const r=await fetch('/api/visionone-config',{cache:'no-store'});const c=await r.json();if(!c.ok)throw new Error(c.message);sb=supabase.createClient(c.supabaseUrl,c.supabaseAnonKey);status.textContent='Connected to Supabase';await load()}catch(e){status.textContent=e.message}}async function load(){let p=await sb.from('patients').select('*').order('created_at',{ascending:false});patients=p.data||[];document.getElementById('patients').innerHTML=patients.map(x=>`<option value="${x.id}">${x.hn} — ${name(x)}</option>`).join('');let t=await sb.from('crm_followups').select('*, patients(hn,first_name,last_name)').order('due_at',{ascending:true});tasks=t.data||[];render()}function render(){list.innerHTML=`<table><thead><tr><th>Due</th><th>Patient</th><th>Type</th><th>Channel</th><th>Priority</th><th>Message</th><th>Status</th></tr></thead><tbody>${tasks.map(x=>`<tr><td>${fmt(x.due_at)}</td><td>${name(x.patients)}</td><td>${x.followup_type}</td><td>${x.channel}</td><td>${x.priority}</td><td>${x.message||'-'}</td><td>${badge(x.status)}</td></tr>`).join('')||'<tr><td colspan="7">No data</td></tr>'}</tbody></table>`}function openModal(){modal.classList.add('active')}function closeModal(){modal.classList.remove('active')}async function saveFollowup(e){e.preventDefault();let f=Object.fromEntries(new FormData(e.target).entries());f.due_at=new Date(f.due_at).toISOString();let r=await sb.from('crm_followups').insert(f);if(r.error){alert(r.error.message);return}closeModal();await load()}init();</script></body></html>
