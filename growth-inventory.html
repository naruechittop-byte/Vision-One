<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vision One Inventory</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{margin:0;font-family:Inter,Segoe UI,Tahoma,sans-serif;background:#f6f3ee;color:#2e2e2e}main{padding:28px}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start}.top h1{font-family:Georgia,serif;color:#071A2F;margin:0;font-weight:500}.sub{color:#77726c;font-size:13px}.card{background:white;border:1px solid #D8D3CB;border-radius:20px;padding:18px;box-shadow:0 18px 45px rgba(7,26,47,.08);margin-top:18px}button{border:0;border-radius:14px;padding:11px 14px;background:#071A2F;color:white;font-weight:800;cursor:pointer}button.secondary{background:white;color:#071A2F;border:1px solid #D8D3CB}table{width:100%;border-collapse:separate;border-spacing:0 9px}th{text-align:left;color:#8a837a;font-size:12px;text-transform:uppercase;padding:0 10px}td{background:#fbfaf7;border-top:1px solid #D8D3CB;border-bottom:1px solid #D8D3CB;padding:12px 10px;font-size:14px}td:first-child{border-left:1px solid #D8D3CB;border-radius:13px 0 0 13px}td:last-child{border-right:1px solid #D8D3CB;border-radius:0 13px 13px 0}.modal{position:fixed;inset:0;background:rgba(7,26,47,.35);display:none;align-items:center;justify-content:center;padding:18px}.modal.active{display:flex}.box{width:min(720px,100%);background:#fbfaf7;border-radius:24px;padding:22px}.form{display:grid;grid-template-columns:1fr 1fr;gap:13px}label{display:block;font-size:12px;font-weight:800;color:#756f68;margin-bottom:6px}input,select{width:100%;border:1px solid #D8D3CB;border-radius:13px;padding:11px;background:white}.span{grid-column:1/-1}.badge{border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;background:#E6F2EA;color:#2f6948}.low{background:#F6E4E4;color:#934141}</style></head><body><main><div class="top"><div><h1>Vision One Inventory</h1><div class="sub" id="status">Loading...</div></div><div><a href="/app-vercel.html"><button class="secondary">Clinic OS</button></a> <button onclick="openModal()">+ Item</button></div></div><div class="card"><h3>Inventory Items</h3><div id="list"></div></div></main><div id="modal" class="modal"><div class="box"><div class="top"><div><h1>New Inventory Item</h1><div class="sub">บันทึกลง inventory_items</div></div><button class="secondary" onclick="closeModal()">Close</button></div><form class="form" onsubmit="saveItem(event)"><div><label>SKU</label><input name="sku"></div><div><label>Name</label><input name="name" required></div><div><label>Category</label><input name="category" value="clinic_supply"></div><div><label>Unit</label><input name="unit" value="item"></div><div><label>Stock</label><input type="number" step="0.01" name="stock_qty" value="0"></div><div><label>Reorder level</label><input type="number" step="0.01" name="reorder_level" value="5"></div><div><label>Unit cost</label><input type="number" step="0.01" name="unit_cost" value="0"></div><div><label>Supplier</label><input name="supplier"></div><div><label>Expiry</label><input type="date" name="expiry_date"></div><div class="span"><button>Save</button></div></form></div></div><script>let sb,items=[];const THB=n=>'฿'+Number(n||0).toLocaleString('th-TH');const day=d=>d?new Date(d).toLocaleDateString('th-TH'):'-';function badge(i){let low=Number(i.stock_qty)<=Number(i.reorder_level);return `<span class="badge ${low?'low':''}">${low?'Low':'OK'}</span>`}async function init(){try{const r=await fetch('/api/visionone-config',{cache:'no-store'});const c=await r.json();if(!c.ok)throw new Error(c.message);sb=supabase.createClient(c.supabaseUrl,c.supabaseAnonKey);status.textContent='Connected to Supabase';await load()}catch(e){status.textContent=e.message}}async function load(){let r=await sb.from('inventory_items').select('*').order('name');items=r.data||[];render()}function render(){list.innerHTML=`<table><thead><tr><th>SKU</th><th>Item</th><th>Category</th><th>Stock</th><th>Reorder</th><th>Cost</th><th>Supplier</th><th>Expiry</th><th>Status</th></tr></thead><tbody>${items.map(x=>`<tr><td>${x.sku||'-'}</td><td>${x.name}</td><td>${x.category}</td><td>${x.stock_qty}</td><td>${x.reorder_level}</td><td>${THB(x.unit_cost)}</td><td>${x.supplier||'-'}</td><td>${day(x.expiry_date)}</td><td>${badge(x)}</td></tr>`).join('')||'<tr><td colspan="9">No data</td></tr>'}</tbody></table>`}function openModal(){modal.classList.add('active')}function closeModal(){modal.classList.remove('active')}async function saveItem(e){e.preventDefault();let f=Object.fromEntries(new FormData(e.target).entries());['stock_qty','reorder_level','unit_cost'].forEach(k=>f[k]=Number(f[k]||0));Object.keys(f).forEach(k=>{if(f[k]==='')delete f[k]});let r=await sb.from('inventory_items').insert(f);if(r.error){alert(r.error.message);return}closeModal();await load()}init();</script></body></html>
