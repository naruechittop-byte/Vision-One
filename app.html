<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Vision One Clinic OS</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{margin:0;font-family:Inter,Segoe UI,Tahoma,sans-serif;background:#f6f3ee;color:#2e2e2e}.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}aside{background:#eee8dd;border-right:1px solid #d8d3cb;padding:22px;position:sticky;top:0;height:100vh}.brand{background:#fff;border:1px solid #d8d3cb;border-radius:20px;padding:14px;margin-bottom:14px}.brand b{font-family:Georgia,serif;color:#071A2F;letter-spacing:3px}.status{background:#fff;border:1px solid #d8d3cb;border-radius:16px;padding:12px;margin-bottom:14px}.nav{padding:11px 12px;border-radius:14px;margin:5px 0;cursor:pointer}.nav:hover{background:#fff}.nav.active{background:#071A2F;color:#fff}.sec{font-size:11px;color:#777;margin:18px 0 8px;letter-spacing:2px;text-transform:uppercase}main{padding:26px}.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:18px}h1{font-family:Georgia,serif;color:#071A2F;margin:0;font-weight:500}.sub{color:#777;font-size:13px}.card{background:#fff;border:1px solid #d8d3cb;border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 12px 30px rgba(7,26,47,.06)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.kpi b{display:block;font-size:28px;color:#071A2F;margin-top:8px}button{border:0;background:#071A2F;color:#fff;border-radius:12px;padding:10px 13px;font-weight:800;cursor:pointer}button.alt{background:#fff;color:#071A2F;border:1px solid #d8d3cb}.view{display:none}.view.active{display:block}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #eee;padding:10px;text-align:left;font-size:14px}th{font-size:12px;text-transform:uppercase;color:#777}.pill{border-radius:999px;padding:4px 8px;background:#eee;font-size:12px}.ok{background:#e6f2ea;color:#2f6948}.warn{background:#f7eedb;color:#8c641b}.bad{background:#f6e4e4;color:#934141}.modal{position:fixed;inset:0;background:rgba(7,26,47,.35);display:none;align-items:center;justify-content:center;padding:18px}.modal.show{display:flex}.box{background:#fbfaf7;border-radius:22px;padding:20px;width:min(760px,100%);max-height:90vh;overflow:auto}.form{display:grid;grid-template-columns:1fr 1fr;gap:12px}label{font-size:12px;font-weight:800;color:#756f68}input,select,textarea{width:100%;padding:10px;border:1px solid #d8d3cb;border-radius:12px;background:#fff}.span{grid-column:1/-1}.toast{position:fixed;right:18px;bottom:18px;background:#071A2F;color:#fff;padding:12px 15px;border-radius:14px;display:none}@media(max-width:850px){.app{grid-template-columns:1fr}aside{height:auto;position:relative}.grid,.form{grid-template-columns:1fr}}</style></head><body><div class="app"><aside><div class="brand"><b>VISION ONE</b><div class="sub">CLINIC OS</div></div><div class="status"><b id="st">Loading</b><div id="ss" class="sub">Vercel + Supabase</div></div><div class="sec">Clinic</div><div class="nav active" data-v="dash">⌘ Dashboard</div><div class="nav" data-v="patients">👁️ Patients</div><div class="nav" data-v="appts">📅 Appointments</div><div class="nav" data-v="visits">🩺 Visits</div><div class="nav" data-v="billing">💳 Billing</div><div class="sec">Growth</div><div class="nav" data-v="crm">☎ CRM Follow-up</div><div class="nav" data-v="inv">📦 Inventory</div></aside><main><div class="top"><div><h1 id="ttl">Dashboard</h1><div id="sub" class="sub">Unified app</div></div><div><button class="alt" id="refresh">Refresh</button> <button id="add">+ New</button></div></div><section id="dash" class="view active"><div id="kpis" class="grid"></div><div class="card"><h3>Alerts</h3><div id="alerts"></div></div></section><section id="patients" class="view"><div class="card"><h3>Patients</h3><div id="patientsT"></div></div></section><section id="appts" class="view"><div class="card"><h3>Appointments</h3><div id="apptsT"></div></div></section><section id="visits" class="view"><div class="card"><h3>Visits</h3><div id="visitsT"></div></div></section><section id="billing" class="view"><div class="card"><h3>Invoices</h3><div id="billingT"></div></div></section><section id="crm" class="view"><div class="card"><h3>CRM Follow-up</h3><div id="crmT"></div></div></section><section id="inv" class="view"><div class="card"><h3>Inventory</h3><div id="invT"></div></div></section></main></div><div id="modal" class="modal"><div class="box"><div class="top"><h1 id="mt">New</h1><button class="alt" id="close">Close</button></div><div id="mb"></div></div></div><div id="toast" class="toast"></div><script>let db=null,view='dash',S={patients:[],appointments:[],visits:[],invoices:[],payments:[],crm_followups:[],inventory_items:[]};const $=id=>document.getElementById(id),fmt=d=>d?new Date(d).toLocaleString('th-TH',{dateStyle:'medium',timeStyle:'short'}):'-',THB=n=>'฿'+Number(n||0).toLocaleString('th-TH'),nm=p=>p?`${p.first_name||''} ${p.last_name||''}`.trim()||'-':'-';function msg(s){toast.textContent=s;toast.style.display='block';setTimeout(()=>toast.style.display='none',2500)}function pill(s){let v=String(s||'').toLowerCase(),c=['ok','paid','completed','confirmed','contacted'].includes(v)?'ok':['pending','draft','scheduled'].includes(v)?'warn':['low','failed','cancelled'].includes(v)?'bad':'';return `<span class="pill ${c}">${s||'-'}</span>`}function table(h,r){return `<table><thead><tr>${h.map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody>${r.length?r.map(a=>`<tr>${a.map(x=>`<td>${x}</td>`).join('')}</tr>`).join(''):`<tr><td colspan="${h.length}">No data</td></tr>`}</tbody></table>`}function opts(){return S.patients.map(p=>`<option value="${p.id}">${p.hn||''} — ${nm(p)}</option>`).join('')}function nav(v){view=v;document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));$(v).classList.add('active');document.querySelectorAll('.nav').forEach(x=>x.classList.remove('active'));document.querySelector(`[data-v="${v}"]`).classList.add('active');let m={dash:['Dashboard','Unified app'],patients:['Patients','ทะเบียนคนไข้'],appts:['Appointments','นัดหมาย'],visits:['Visits','ประวัติการตรวจ'],billing:['Billing','การเงิน'],crm:['CRM Follow-up','ติดตามคนไข้'],inv:['Inventory','สต็อก']};ttl.textContent=m[v][0];sub.textContent=m[v][1];add.textContent={patients:'+ Patient',appts:'+ Appointment',visits:'+ Visit',billing:'+ Invoice',crm:'+ Follow-up',inv:'+ Item'}[v]||'+ New'}function render(){let rev=S.payments.reduce((a,b)=>a+Number(b.amount||0),0),due=S.crm_followups.filter(x=>['pending','failed'].includes(x.status)).length,low=S.inventory_items.filter(x=>Number(x.stock_qty)<=Number(x.reorder_level)).length;kpis.innerHTML=`<div class="card kpi">Patients<b>${S.patients.length}</b></div><div class="card kpi">Appointments<b>${S.appointments.length}</b></div><div class="card kpi">Revenue<b>${THB(rev)}</b></div><div class="card kpi">Alerts<b>${due+low}</b></div>`;alerts.innerHTML=table(['Type','Detail','Status'],[['CRM',due+' pending',due?pill('Pending'):pill('OK')],['Inventory',low+' low stock',low?pill('Low'):pill('OK')]]);patientsT.innerHTML=table(['HN','Name','Phone','PDPA'],S.patients.map(p=>[p.hn||'-',nm(p),p.phone||'-',p.pdpa_consent?pill('OK'):pill('No')]));apptsT.innerHTML=table(['Time','Patient','Status'],S.appointments.map(a=>[fmt(a.start_at),nm(a.patients),pill(a.status)]));visitsT.innerHTML=table(['Date','Patient','CC','Diagnosis'],S.visits.map(v=>[v.visit_date,nm(v.patients),v.chief_complaint||'-',v.diagnosis||'-']));billingT.innerHTML=table(['Invoice','Patient','Total','Status'],S.invoices.map(i=>[i.invoice_no,nm(i.patients),THB(i.total),pill(i.status)]));crmT.innerHTML=table(['Due','Patient','Type','Channel','Message','Status'],S.crm_followups.map(f=>[fmt(f.due_at),nm(f.patients),f.followup_type,f.channel,f.message||'-',pill(f.status)]));invT.innerHTML=table(['SKU','Item','Stock','Reorder','Cost','Status'],S.inventory_items.map(i=>[i.sku||'-',i.name,i.stock_qty,i.reorder_level,THB(i.unit_cost),Number(i.stock_qty)<=Number(i.reorder_level)?pill('Low'):pill('OK')]))}async function get(k,q){try{let r=await q;if(r.error)throw r.error;S[k]=r.data||[]}catch(e){S[k]=[];msg(k+': '+e.message)}}async function load(){if(!db){render();return}await Promise.all([get('patients',db.from('patients').select('*').order('created_at',{ascending:false})),get('appointments',db.from('appointments').select('*,patients(hn,first_name,last_name)').order('start_at',{ascending:true})),get('visits',db.from('visits').select('*,patients(hn,first_name,last_name)').order('created_at',{ascending:false})),get('invoices',db.from('invoices').select('*,patients(hn,first_name,last_name)').order('issued_at',{ascending:false})),get('payments',db.from('payments').select('*')),get('crm_followups',db.from('crm_followups').select('*,patients(hn,first_name,last_name)').order('due_at',{ascending:true})),get('inventory_items',db.from('inventory_items').select('*').order('name'))]);render();msg('Loaded')}function open(title,html){mt.textContent=title;mb.innerHTML=html;modal.classList.add('show')}function closeM(){modal.classList.remove('show')}function form(t,body){open('Add '+t,`<form class="form" data-t="${t}">${body}<div class="span"><button>Save</button></div></form>`)}function addNew(){if(view==='patients')form('patients','<div><label>HN</label><input name="hn" required></div><div><label>Phone</label><input name="phone"></div><div><label>First name</label><input name="first_name" required></div><div><label>Last name</label><input name="last_name"></div><div><label>PDPA</label><select name="pdpa_consent"><option value="true">Consent</option><option value="false">No</option></select></div>');else if(view==='appts')form('appointments',`<div><label>Patient</label><select name="patient_id">${opts()}</select></div><div><label>Status</label><select name="status"><option>pending</option><option>confirmed</option></select></div><div><label>Start</label><input type="datetime-local" name="start_at" required></div><div><label>End</label><input type="datetime-local" name="end_at" required></div><div class="span"><label>CC</label><textarea name="chief_complaint"></textarea></div>`);else if(view==='visits')form('visits',`<div><label>Patient</label><select name="patient_id">${opts()}</select></div><div><label>Date</label><input type="date" name="visit_date" value="${new Date().toISOString().slice(0,10)}"></div><div class="span"><label>CC</label><textarea name="chief_complaint"></textarea></div><div class="span"><label>Diagnosis</label><textarea name="diagnosis"></textarea></div>`);else if(view==='billing')form('invoices',`<div><label>No</label><input name="invoice_no" value="INV-${Date.now().toString().slice(-6)}"></div><div><label>Patient</label><select name="patient_id">${opts()}</select></div><div><label>Total</label><input type="number" name="total" value="0"></div><div><label>Status</label><select name="status"><option>draft</option><option>paid</option></select></div>`);else if(view==='crm')form('crm_followups',`<div><label>Patient</label><select name="patient_id">${opts()}</select></div><div><label>Type</label><select name="followup_type"><option>recall</option><option>post_op</option><option>review</option></select></div><div><label>Channel</label><select name="channel"><option>line</option><option>phone</option></select></div><div><label>Due</label><input type="datetime-local" name="due_at" required></div><div class="span"><label>Message</label><textarea name="message"></textarea></div>`);else if(view==='inv')form('inventory_items','<div><label>SKU</label><input name="sku"></div><div><label>Name</label><input name="name" required></div><div><label>Stock</label><input type="number" name="stock_qty" value="0"></div><div><label>Reorder</label><input type="number" name="reorder_level" value="5"></div><div><label>Cost</label><input type="number" name="unit_cost" value="0"></div><div><label>Category</label><input name="category" value="clinic_supply"></div>');else nav('patients')}async function save(e){e.preventDefault();if(!db){msg('Supabase not connected');return}let t=e.target.dataset.t,f=Object.fromEntries(new FormData(e.target).entries());Object.keys(f).forEach(k=>{if(f[k]==='')delete f[k]});['start_at','end_at','due_at'].forEach(k=>{if(f[k])f[k]=new Date(f[k]).toISOString()});['total','stock_qty','reorder_level','unit_cost'].forEach(k=>{if(k in f)f[k]=Number(f[k]||0)});if(t==='patients'&&f.pdpa_consent){f.pdpa_consent=f.pdpa_consent==='true';f.pdpa_consent_at=f.pdpa_consent?new Date().toISOString():null}if(t==='invoices'){f.subtotal=f.total||0;f.discount=0;f.tax=0;f.paid_amount=f.status==='paid'?f.total||0:0}let r=await db.from(t).insert(f);if(r.error){msg(r.error.message);return}closeM();await load()}document.querySelectorAll('.nav').forEach(n=>n.onclick=()=>nav(n.dataset.v));refresh.onclick=load;add.onclick=addNew;close.onclick=closeM;modal.onclick=e=>{if(e.target===modal)closeM()};document.body.addEventListener('submit',e=>{if(e.target.dataset.t)save(e)});render();(async()=>{try{let r=await fetch('/api/visionone-config',{cache:'no-store'}),c=await r.json();if(!c.ok)throw new Error(c.message);db=supabase.createClient(c.supabaseUrl,c.supabaseAnonKey);st.textContent='Connected';ss.textContent='Unified app live';await load()}catch(e){st.textContent='Offline UI';ss.textContent=e.message;render();msg('UI works, Supabase not connected')}})();</script></body></html>
